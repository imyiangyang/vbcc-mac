name: Build and Test

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-test:
    name: Build and run unit tests
    runs-on: macos-26-arm64

    steps:
      - name: Checkout
        uses: actions/checkout@v5

      - name: Select Xcode 26.4.1
        run: sudo xcode-select -s /Applications/Xcode_26.4.1.app

      - name: Show Xcode version
        run: xcodebuild -version

      - name: Build
        run: |
          xcodebuild build \
            -project vbcc-mac.xcodeproj \
            -scheme vbcc-mac \
            -configuration Debug \
            -destination 'platform=macOS' \
            -derivedDataPath build \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Unit tests
        run: |
          xcodebuild test \
            -project vbcc-mac.xcodeproj \
            -scheme vbcc-mac \
            -configuration Debug \
            -destination 'platform=macOS' \
            -derivedDataPath build \
            -only-testing:vbcc-macTests \
            CODE_SIGN_IDENTITY="" \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGNING_ALLOWED=NO

      - name: Package .app as zip
        run: |
          cd build/Build/Products/Debug
          ditto -c -k --sequesterRsrc --keepParent vbcc-mac.app vbcc-mac.zip

      - name: Upload artifact (unsigned)
        uses: actions/upload-artifact@v4
        with:
          name: vbcc-mac-unsigned-${{ github.sha }}
          path: build/Build/Products/Debug/vbcc-mac.zip
          if-no-files-found: error
          retention-days: 30
